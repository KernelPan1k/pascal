version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pascal_cms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pascal_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_strong_password}
      POSTGRES_DB: pascal_cms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pascal_admin -d pascal_cms"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
